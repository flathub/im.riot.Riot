app-id: im.riot.Riot
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: element
separate-locales: false
finish-args:
  - --device=all
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons # For correct cursor scaling under Wayland
  - --filesystem=xdg-run/keyring
  - --filesystem=xdg-run/pipewire-0
  - --require-version=1.7.0
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=wayland
  - --talk-name=com.canonical.Unity
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.kde.StatusNotifierWatcher
cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/*.la
  - /lib/*.a
  - /share/pkgconfig
  - /share/aclocal
  - /share/gtk-doc
  - /share/doc
  - /share/info
  - /share/man
  - /man
modules:
  - name: riot
    buildsystem: simple
    build-commands:
      - install element.sh /app/bin/element
      - install -Dm644 im.riot.Riot.desktop /app/share/applications/im.riot.Riot.desktop
      - install -Dm644 im.riot.Riot.metainfo.xml /app/share/metainfo/im.riot.Riot.metainfo.xml
      - rm element.sh im.riot.Riot.desktop im.riot.Riot.metainfo.xml
      - install -Dm644 ElementLogomark.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - mkdir /app/Element
      - cp -r * /app/Element
      - chmod -R a-s,go+rX,go-w "/app/Element"
      - patch-desktop-filename ${FLATPAK_DEST}/Element/resources/app.asar
    sources:
      - type: archive
        only-arches:
          - x86_64
        url: https://packages.element.io/desktop/install/linux/glibc-x86-64/element-desktop-1.12.10.tar.gz
        sha256: 492b2a0dfc8ac685eeaded27730e4de515cb7695a84e838d24f9e21bda2f6174
        x-checker-data:
          type: html
          url: https://packages.element.io/desktop/install/linux/glibc-x86-64/index.html
          version-pattern: element-desktop-([\d\.-]*).tar.gz
          url-template: https://packages.element.io/desktop/install/linux/glibc-x86-64/element-desktop-$version.tar.gz
      - type: archive
        only-arches:
          - aarch64
        url: https://packages.element.io/desktop/install/linux/glibc-aarch64/element-desktop-1.12.10-arm64.tar.gz
        sha256: 6e4ea4d605293b3f5d584e5163223d04e4927c92ee1db30a2b7bf6ab17b065ff
        x-checker-data:
          type: html
          url: https://packages.element.io/desktop/install/linux/glibc-aarch64/index.html
          version-pattern: element-desktop-([\d\.-]*)-arm64.tar.gz
          url-template: https://packages.element.io/desktop/install/linux/glibc-aarch64/element-desktop-$version-arm64.tar.gz
      - type: file
        path: element.sh
      - type: file
        path: im.riot.Riot.metainfo.xml
      - type: file
        path: im.riot.Riot.desktop
      - type: file
        path: ElementLogomark.svg
